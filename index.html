<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Map App</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDNtKd51uBJx4cYXoteOq72GZmq7Re4Qf0"></script>
    
    <style>
        /* ▼▼▼ 進化：ページ全体の余白をゼロにし、スクロール制御の土台を作る ▼▼▼ */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 0; }
        
        /* ▼▼▼ 極限進化：地図とヘッダーを画面上部にガッチリ固定する魔法 ▼▼▼ */
        #sticky-top {
            position: sticky;
            top: 0;
            background-color: #f4f7f9;
            padding: 15px 20px 10px 20px;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); /* スクロール時に浮いているように見せる影 */
        }
        
        .header { text-align: center; margin-bottom: 10px; }
        h1 { color: #06C755; margin: 0; font-size: 1.8rem; }
        #welcome { font-size: 0.9rem; color: #666; margin-top: 5px; }
        
        /* 固定時は少し高さを抑えるのがアプリの鉄則 */
        #map { height: 280px; width: 100%; border-radius: 12px; border: 2px solid #06C755; display: none; box-sizing: border-box;}
        #loading { text-align: center; color: #06C755; font-weight: bold; margin-top: 10px; }

        /* リスト部分は自由にスクロールできる */
        #memory-list { padding: 15px 20px 100px 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* ▼▼▼ 進化：削除ボタンを右上に配置するための相対位置 ▼▼▼ */
        .memory-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        
        /* 削除ボタン（右上固定） */
        .btn-delete { position: absolute; top: 15px; right: 15px; background-color: #fff0f0; color: #d32f2f; border: 1px solid #ffcdd2; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-delete:active { background-color: #ffcdd2; }
        
        /* 削除ボタンと重ならないように右に余白を開ける */
        .memory-date { font-size: 0.8rem; color: #888; margin-bottom: 10px; padding-right: 60px; }
        
        .memory-text { font-size: 1rem; line-height: 1.5; margin-bottom: 15px; white-space: pre-wrap; }
        .btn-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; text-decoration: none; font-weight: bold; }
        .btn-map { background-color: #E8F5E9; color: #2E7D32; }
        .btn-img { background-color: #E3F2FD; color: #1565C0; }

        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; align-items: flex-end;}
        .fab-sub { width: 45px; height: 45px; background-color: white; color: #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; border: 1px solid #ddd;}
        .fab-main { width: 65px; height: 65px; background-color: #06C755; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 35px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
        
        #input-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; max-height: 90vh; overflow-y: auto;}
        
        #preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .preview-box { aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #ddd; background: #fafafa;}
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; cursor: pointer; }

        .add-more-box { aspect-ratio: 1/1; border-radius: 8px; border: 2px dashed #ccc; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; cursor: pointer; background: #fafafa;}
        .add-more-box span { font-size: 28px; font-weight: bold; line-height: 1; margin-bottom: 2px;}
        .add-more-box p { font-size: 0.7rem; margin: 0; font-weight: bold; }

        #modal-map-container { position: relative; width: 100%; height: 200px; display: none; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; box-shadow: inset 0 0 5px rgba(0,0,0,0.1);}
        #modal-map { width: 100%; height: 100%; }
        .center-pin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%); font-size: 36px; pointer-events: none; z-index: 10; text-shadow: 0px 3px 5px rgba(0,0,0,0.4); }
        .recenter-btn { position: absolute; top: 10px; right: 10px; width: 40px; height: 40px; background: white; border: none; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 10;}

        .gps-container { display: flex; align-items: center; justify-content: center; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #eee;}
        #gps-status { font-size: 0.9rem; font-weight: bold; }
        
        textarea { width: 100%; height: 80px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 1rem; box-sizing: border-box; resize: none; }
        
        .action-btn { padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-submit { background-color: #06C755; color: white; }
        .btn-submit:disabled { background-color: #a0e0b9; cursor: not-allowed; }
        .btn-cancel { background-color: white; color: #888; border: 1px solid #ddd;}
    </style>
</head>
<body>
    
    <div id="sticky-top">
        <div class="header"><h1>Memory Map</h1><div id="welcome">読み込み中...</div></div>
        <div id="map"></div>
        <div id="loading">記憶を召喚中...</div>
    </div>

    <div id="memory-list"></div>

    <div class="fab-container">
        <div class="fab-sub" onclick="openTextModal()">📝</div>
        <div class="fab-main" onclick="document.getElementById('main-trigger').click()">＋</div>
    </div>

    <input type="file" id="main-trigger" accept="image/*" capture="environment" onchange="handleDirectFiles(event)" style="display: none;">
    <input type="file" id="add-more-trigger" accept="image/*" multiple onchange="handleDirectFiles(event)" style="display: none;">

    <div id="input-modal">
        <div class="modal-content">
            <div id="preview-grid"></div>
            
            <div id="modal-map-container">
                <div id="modal-map"></div>
                <div class="center-pin">📍</div>
                <button class="recenter-btn" onclick="getGps(true)">🎯</button>
            </div>
            
            <div class="gps-container">
                <span id="gps-status">⏳ 位置情報を準備中...</span>
            </div>
            
            <textarea id="memo-input" placeholder="ここにメモを入力..."></textarea>
            
            <button class="action-btn btn-submit" onclick="submitData()">🚀 送信する</button>
            <button class="action-btn btn-cancel" onclick="closeModal()">キャンセル</button>
        </div>
    </div>

    <script>
        // 【重要2】GASのURLを貼る！
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxS4N8TrRihDFQJnNMjbiKYUTtCEIkX0rBqTpbxVkzUBidv-CcSi-Ym-TU9EtfPxY18/exec";
        
        let map; let bounds;
        let currentLat = null; let currentLng = null;
        let stagingFiles = [];
        let modalMap = null; 

        function compressImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = function() {
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxWidth) { height = Math.round(height * (maxWidth / width)); width = maxWidth; }
                        } else { if (height > maxHeight) { width = Math.round(width * (maxHeight / height)); height = maxHeight; } }
                        const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = function(error) { reject(error); };
                };
                reader.onerror = function(error) { reject(error); };
            });
        }

        function initModalMap(lat, lng) {
            document.getElementById('modal-map-container').style.display = 'block';
            const pos = { lat: lat, lng: lng };
            if (!modalMap) {
                modalMap = new google.maps.Map(document.getElementById("modal-map"), { center: pos, zoom: 16, mapTypeControl: false, streetViewControl: false, fullscreenControl: false, gestureHandling: "greedy" });
                modalMap.addListener('dragend', () => {
                    const center = modalMap.getCenter(); currentLat = center.lat(); currentLng = center.lng();
                    const statusText = document.getElementById('gps-status');
                    statusText.innerText = "✍️ 手動で場所を設定中"; statusText.style.color = "#FF9800";
                });
            } else { modalMap.setCenter(pos); }
        }

        function getGps(isRecenter = false) {
            const statusText = document.getElementById('gps-status');
            statusText.innerText = "⏳ 現在地を取得中..."; statusText.style.color = "blue";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        currentLat = position.coords.latitude; currentLng = position.coords.longitude;
                        statusText.innerText = isRecenter ? "🎯 現在地に戻りました" : "✅ 現在地を取得しました"; statusText.style.color = "#06C755";
                        initModalMap(currentLat, currentLng);
                    },
                    function(error) {
                        statusText.innerText = "❌ 取得失敗。地図を動かして場所を決めてください。"; statusText.style.color = "red";
                        if (!currentLat) currentLat = 35.681236; if (!currentLng) currentLng = 139.767125;
                        initModalMap(currentLat, currentLng);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }

        function handleDirectFiles(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;
            if (stagingFiles.length + files.length > 5) {
                alert("⚠️ 一度に送信できる写真は最大5枚までです。\n超過分は自動的に除外されます。");
                const allowedCount = 5 - stagingFiles.length;
                stagingFiles = stagingFiles.concat(files.slice(0, allowedCount));
            } else {
                stagingFiles = stagingFiles.concat
